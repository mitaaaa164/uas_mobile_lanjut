name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Flutter Clean
        run: flutter clean

      - name: Repair Pub Cache
        run: flutter pub cache repair

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --release --dart-define=ENV=PROD

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UAS_DigiNews_20123051
          path: build/app/outputs/flutter-apk/app-release.apk